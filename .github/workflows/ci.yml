name: CI

on:
  push:
    branches: [main, master, develop, 'codex/**']
  pull_request:
    branches: [main, master, develop]

jobs:
  backend:
    name: Backend Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: apps/api/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest-cov

      - name: Run tests with coverage
        run: |
          python -m pytest tests/ \
            --cov=app \
            --cov-report=xml \
            --cov-report=term-missing \
            --cov-fail-under=35
        env:
          DATABASE_URL: sqlite+aiosqlite:///file:testdb?mode=memory&cache=shared&uri=true
          DATABASE_URL_SYNC: sqlite:///:memory:
          SECRET_KEY: test-secret-key-not-for-production
          SINGLE_USER_MODE: 'true'
          DEBUG: 'true'
          KIMI_API_KEY: test-dummy-key

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: apps/api/coverage.xml

  frontend-unit:
    name: Frontend Unit Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: apps/web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type check
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Run unit tests
        run: npm run test -- --coverage --reporter=verbose

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: frontend-unit-coverage
          path: apps/web/coverage/

  frontend-e2e:
    name: Frontend E2E Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: apps/web/package-lock.json

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: apps/api/requirements.txt

      - name: Install frontend dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Install backend dependencies
        working-directory: apps/api
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Start backend server
        working-directory: apps/api
        run: |
          uvicorn app.main:app --host 0.0.0.0 --port 8000 --env-file .env.example &
          sleep 5
        env:
          DATABASE_URL: sqlite+aiosqlite:///file:e2e?mode=memory&cache=shared&uri=true
          DATABASE_URL_SYNC: sqlite:///:memory:
          SECRET_KEY: test-secret-key-not-for-production
          SINGLE_USER_MODE: 'true'
          DEBUG: 'true'
          KIMI_API_KEY: test-dummy-key
          CORS_ORIGINS: '["http://localhost:3000"]'

      - name: Run E2E tests
        run: npx playwright test
        env:
          CI: 'true'

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: apps/web/playwright-report/
          retention-days: 7
