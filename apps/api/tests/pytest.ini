[pytest]
asyncio_mode = auto
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts =
    -v
    --tb=short
    --strict-markers
markers =
    llm: marks tests that interact with LLM providers
    medical: marks tests related to medical terminology
    validation: marks tests for output validation
    skill: marks tests for skill processing
    async_test: marks async tests
